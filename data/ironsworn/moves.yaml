    miss: On a miss, you are defeated and the objective is lost to you. Pay the Price.
- name: Endure Harm
  trigger: When you face physical damage...
  stat_options:
  - iron
  stat_hint: ''
  roll_type: action
  outcomes:
    strong_hit: "On a strong hit, choose one.\n\n  * Shake it off: If your health\
