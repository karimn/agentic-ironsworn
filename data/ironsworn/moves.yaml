    weak_hit: On a weak hit, they ask something more of you first. Envision what it
      is (Ask the Oracle if unsure), do it (or Swear an Iron Vow), and mark the bond.
      If you refuse or fail, Pay the Price.
    miss: On a miss, they reject you. Pay the Price.
- name: Test Your Bond
  trigger: When your bond is tested through conflict, betrayal, or circumstance...
