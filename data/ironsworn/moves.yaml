- name: Face Danger
  trigger: When you attempt something risky or react to an imminent threat...
  stat_options:
  - edge
  - heart
  - iron
  - shadow
  - wits
  stat_hint: With speed, agility, or precision; With charm, loyalty, or courage; With
    aggressive action, forceful defense, strength, or endurance; With deception, stealth,
    or trickery; With expertise, insight, or observation
  roll_type: action
  outcomes:
    strong_hit: On a strong hit, you are successful. Take +1 momentum.
    weak_hit: "On a weak hit, you succeed, but face a troublesome cost. Choose one.\n\
      \n  * You are delayed, lose advantage, or face a new danger: Suffer -1 momentum.\n\
      \  * You are tired or hurt: Endure Harm (1 harm).\n  * You are dispirited or\
      \ afraid: Endure Stress (1 stress).\n  * You sacrifice resources: Suffer -1\
      \ supply."
    miss: On a miss, you fail, or your progress is undermined by a dramatic and costly
      turn of events. Pay the Price.
- name: Secure an Advantage
  trigger: When you assess a situation, make preparations, or attempt to gain leverage...
  stat_options:
  - edge
  - heart
  - iron
  - shadow
  - wits
  stat_hint: With speed, agility, or precision; With charm, loyalty, or courage; With
    aggressive action, forceful defense, strength, or endurance; With deception, stealth,
    or trickery; With expertise, insight, or observation
  roll_type: action
  outcomes:
    strong_hit: "On a strong hit, you gain advantage. Choose one.\n\n  * Take control:\
      \ Make another move now (not a progress move), and add +1.\n  * Prepare to act:\
      \ Take +2 momentum."
    weak_hit: On a weak hit, your advantage is short-lived. Take +1 momentum.
    miss: On a miss, you fail or your assumptions betray you. Pay the Price.
- name: Gather Information
  trigger: When you search an area, ask questions, conduct an investigation, or follow
    a track...
  stat_options:
  - wits
  stat_hint: ''
  roll_type: action
  outcomes:
    strong_hit: On a strong hit, you discover something helpful and specific. The
      path you must follow or action you must take to make progress is made clear.
      Envision what you learn (Ask the Oracle if unsure), and take +2 momentum.
    weak_hit: On a weak hit, the information complicates your quest or introduces
      a new danger. Envision what you discover (Ask the Oracle if unsure), and take
      +1 momentum.
    miss: On a miss, your investigation unearths a dire threat or reveals an unwelcome
      truth that undermines your quest. Pay the Price.
- name: Heal
  trigger: When you treat an injury or ailment...
  stat_options:
  - wits
  - iron
  stat_hint: Mend your own wounds
  roll_type: action
  outcomes:
    strong_hit: On a strong hit, your care is helpful. If you (or the ally under your
      care) have the wounded condition, you may clear it. Then, take or give up to
      +2 health.
    weak_hit: On a weak hit, your care is helpful, but you must suffer -1 supply or
      -1 momentum (your choice). If you (or the ally under your care) have the wounded
      condition, you may clear it. Then, take or give up to +2 health.
    miss: On a miss, your aid is ineffective. Pay the Price.
- name: Resupply
  trigger: When you hunt, forage, or scavenge...
  stat_options:
  - wits
  stat_hint: ''
  roll_type: action
  outcomes:
    strong_hit: On a strong hit, you bolster your resources. Take +2 supply.
    weak_hit: On a weak hit, take up to +2 supply, but suffer -1 momentum for each.
    miss: On a miss, you find nothing helpful. Pay the Price.
- name: Make Camp
  trigger: When you rest and recover for several hours in the wild...
  stat_options: []
  stat_hint: ''
  roll_type: action
  outcomes:
    strong_hit: "On a strong hit, you and your allies may each choose two.\n\n  *\
      \ Recuperate: Take +1 health for you and any companions.\n  * Partake: Suffer\
      \ -1 supply and take +1 health for you and any companions.\n  * Relax: Take\
      \ +1 spirit.\n  * Focus: Take +1 momentum.\n  * Prepare: When you break camp,\
      \ add +1 if you Undertake a Journey."
    weak_hit: "On a weak hit, you and your allies may each choose one.\n\n  * Recuperate:\
      \ Take +1 health for you and any companions.\n  * Partake: Suffer -1 supply\
      \ and take +1 health for you and any companions.\n  * Relax: Take +1 spirit.\n\
      \  * Focus: Take +1 momentum.\n  * Prepare: When you break camp, add +1 if you\
      \ Undertake a Journey."
    miss: On a miss, you take no comfort. Pay the Price.
- name: Undertake a Journey
  trigger: When you travel across hazardous or unfamiliar lands...
  stat_options:
  - wits
  stat_hint: ''
  roll_type: action
  outcomes:
    strong_hit: "On a strong hit, you reach a waypoint. If the waypoint is unknown\
      \ to you, envision it (Ask the Oracle if unsure). Then, choose one.\n\n  * You\
      \ make good use of your resources: Mark progress.\n  * You move at speed: Mark\
      \ progress and take +1 momentum, but suffer -1 supply."
    weak_hit: On a weak hit, you reach a waypoint and mark progress, but suffer -1
      supply.
    miss: On a miss, you are waylaid by a perilous event. Pay the Price.
- name: Reach Your Destination
  trigger: When your journey comes to an end...
  stat_options: []
  stat_hint: ''
  roll_type: progress
  outcomes:
    strong_hit: "On a strong hit, the situation at your destination favors you. Choose\
      \ one.\n\n  * Make another move now (not a progress move), and add +1.\n  *\
      \ Take +1 momentum."
    weak_hit: On a weak hit, you arrive but face an unforeseen hazard or complication.
      Envision what you find (Ask the Oracle if unsure).
    miss: On a miss, you have gone hopelessly astray, your objective is lost to you,
      or you were misled about your destination. If your journey continues, clear
      all but one filled progress, and raise the journey’s rank by one (if not already
      epic).
- name: Compel
  trigger: When you attempt to persuade someone to do something...
  stat_options:
  - heart
  - iron
  - shadow
  stat_hint: Charm, pacify, barter, or convince; Threaten or incite; Lie or swindle
  roll_type: action
  outcomes:
    strong_hit: On a strong hit, they’ll do what you want or share what they know.
      Take +1 momentum. If you use this exchange to Gather Information, make that
      move now and add +1.
    weak_hit: 'On a weak hit, they’ll do what you want or share what they know...
      but they ask something of you in return. Envision what they want (Ask the Oracle
      if unsure).


      Take +1 momentum. If you use this exchange to Gather Information, make that
      move now and add +1.'
    miss: On a miss, they refuse or make a demand which costs you greatly. Pay the
      Price.
- name: Sojourn
  trigger: When you spend time in a community seeking assistance...
  stat_options:
  - heart
  stat_hint: ''
  roll_type: action
  outcomes:
    strong_hit: "On a strong hit, you and your allies may each choose two from within\
      \ the categories below.\n\nYou and your allies may each focus on one of your\
      \ chosen recover actions and roll +heart again. If you share a bond, add +1.\
      \ On a strong hit, take +2 more for that action. On a weak hit, take +1 more.\
      \ On a miss, it goes badly and you lose all benefits for that action.\n\nClear\
      \ a Condition\n\n  * Mend: Clear a wounded debility and take +1 health.\n  *\
      \ Hearten: Clear a shaken debility and take +1 spirit.\n  * Equip: Clear an\
      \ unprepared debility and take +1 supply.\n\nRecover\n\n  * Recuperate: Take\
      \ +2 health for yourself and any companions.\n  * Consort: Take +2 spirit.\n\
      \  * Provision: Take +2 supply.\n  * Plan: Take +2 momentum.\n\nProvide Aid\n\
      \n  * Take a quest: Envision what this community needs, or what trouble it is\
      \ facing (Ask the Oracle if unsure). If you chose to help, Swear an Iron Vow\
      \ and add +1."
    weak_hit: "On a weak hit, you and your allies may each choose one from within\
      \ the categories below.\n\nYou and your allies may each focus on one of your\
      \ chosen recover actions and roll +heart again. If you share a bond, add +1.\
      \ On a strong hit, take +2 more for that action. On a weak hit, take +1 more.\
      \ On a miss, it goes badly and you lose all benefits for that action.\n\nClear\
      \ a Condition\n\n  * Mend: Clear a wounded debility and take +1 health.\n  *\
      \ Hearten: Clear a shaken debility and take +1 spirit.\n  * Equip: Clear an\
      \ unprepared debility and take +1 supply.\n\nRecover\n\n  * Recuperate: Take\
      \ +2 health for yourself and any companions.\n  * Consort: Take +2 spirit.\n\
      \  * Provision: Take +2 supply.\n  * Plan: Take +2 momentum.\n\nProvide Aid\n\
      \n  * Take a quest: Envision what this community needs, or what trouble it is\
      \ facing (Ask the Oracle if unsure). If you chose to help, Swear an Iron Vow\
      \ and add +1."
    miss: On a miss, you find no help here. Pay the Price.
- name: Draw the Circle
  trigger: When you challenge someone to a formal duel, or accept a challenge...
  stat_options:
  - heart
  stat_hint: ''
  roll_type: action
  outcomes:
    strong_hit: "On a strong hit, take +1 momentum. You may also choose up to two\
      \ boasts and take +1 momentum for each.\n\n  * Grant first strike: Your foe\
      \ has initiative.\n  * Bare yourself: Take no benefit of armor or shield; your\
      \ foe’s harm is +1.\n  * Hold no iron: Take no benefit of weapons; your harm\
      \ is 1.\n  * Bloody yourself: Endure Harm (1 harm).\n  * To the death: One way\
      \ or another, this fight must end with death.\n\nThen, make moves to resolve\
      \ the fight. If you are the victor, you may make a lawful demand, and your opponent\
      \ must comply or forfeit their honor and standing. If you refuse the challenge,\
      \ surrender, or are defeated, they make a demand of you."
    weak_hit: "On a weak hit, you may choose one boast in exchange for +1 momentum.\n\
      \n  * Grant first strike: Your foe has initiative.\n  * Bare yourself: Take\
      \ no benefit of armor or shield; your foe’s harm is +1.\n  * Hold no iron: Take\
      \ no benefit of weapons; your harm is 1.\n  * Bloody yourself: Endure Harm (1\
      \ harm).\n  * To the death: One way or another, this fight must end with death.\n\
      \nThen, make moves to resolve the fight. If you are the victor, you may make\
      \ a lawful demand, and your opponent must comply or forfeit their honor and\
      \ standing. If you refuse the challenge, surrender, or are defeated, they make\
      \ a demand of you."
    miss: 'On a miss, you begin the duel at a disadvantage. Your foe has initiative.
      Pay the Price.


      Then, make moves to resolve the fight. If you are the victor, you may make a
      lawful demand, and your opponent must comply or forfeit their honor and standing.
      If you refuse the challenge, surrender, or are defeated, they make a demand
      of you.'
