  stat_hint: ''
  roll_type: action
  outcomes:
    strong_hit: ''
    weak_hit: ''
    miss: ''
- name: End the Fight
  trigger: When you make a move to take decisive action, and score a strong hit...
  stat_options: []
  stat_hint: ''
  roll_type: progress
  outcomes:
    strong_hit: On a strong hit, this foe is no longer in the fight. They are killed,
