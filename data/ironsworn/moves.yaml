      \ overcome: Endure Stress.\n  * Your victory is short-lived: A new danger or\
      \ foe appears, or an existing danger worsens.\n  * You suffer collateral damage:\
      \ Something of value is lost or broken, or someone important must pay the cost.\n\
      \  * You’ll pay for it: An objective falls out of reach.\n  * Others won’t forget:\
      \ You are marked for vengeance.\n\nThe foe is killed, out of action, flees,\
      \ or surrenders as appropriate to the situation and your intent (Ask the Oracle\
      \ if unsure)."
    miss: On a miss, you have lost this fight. Pay the Price.
- name: Battle
  trigger: When you fight a battle, and it happens in a blur, and you...
