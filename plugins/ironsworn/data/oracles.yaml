- name: Endure Harm
  dice: 1d100
  rolls:
  - min: 1
    max: 10
    outcome: The harm is mortal. Face Death.
  - min: 11
    max: 20
    outcome: You are dying. You need to Heal within an hour or two, or Face Death.
  - min: 21
    max: 35
    outcome: You are unconscious and out of action. If left alone, you come back to
      your senses in an hour or two. If you are vulnerable to a foe not inclined to
      show mercy, Face Death.
  - min: 36
    max: 50
    outcome: You are reeling and fighting to stay conscious. If you engage in any
      vigorous activity (such as running or fighting) before taking a breather for
      a few minutes, roll on this table again (before resolving the other move).
  - min: 51
    max: 100
    outcome: You are battered but still standing.
- name: Endure Stress
  dice: 1d100
  rolls:
  - min: 1
    max: 10
    outcome: You are overwhelmed. Face Desolation.
  - min: 11
    max: 25
    outcome: You give up. Forsake Your Vow (if possible, one relevant to your current
      crisis).
  - min: 26
    max: 50
    outcome: You give in to a fear or compulsion, and act against your better instincts.
  - min: 51
    max: 100
    outcome: You persevere.
