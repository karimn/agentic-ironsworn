    - text: ""
      default: false

- name: Wright
  type: path
  abilities:
    - text: "When you Secure an Advantage by crafting a useful item using your specialty, or when you Face Danger to create or repair an item in a perilous situation, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

# ─── Ritual Assets ───────────────────────────────────────────────────────────

- name: Augur
  type: ritual
  abilities:
    - text: "When you summon a flock of crows and ask a single question, roll +wits. On a strong hit, you interpret their calls as a helpful omen. Envision the answer and take +2 momentum. On a weak hit, the answer is unclear."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Awakening
  type: ritual
  abilities:
    - text: "When you create a simulacrum, roll +heart. On a strong hit, your creation is given unnatural life. If it aids you as you make a move, treat a weak hit as a strong hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Bind
  type: ritual
  abilities:
    - text: "When you wear an animal pelt and dance in moonlight, roll +wits. On a strong hit, you or an ally may wear the pelt and add +1 when making moves that call upon the nature of that animal."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Communion
  type: ritual
  abilities:
    - text: "When you surround the remains of a recently deceased intelligent creature with lit candles, and summon its spirit, roll +heart. Add +1 if you share a bond with the spirit. On a strong hit, you may ask it three questions."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Divination
  type: ritual
  abilities:
    - text: "When you take a drop of blood from a willing subject (not yourself) and cast the rune-carved stones, roll +heart. On a strong hit, you may ask two questions about the subject."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Invoke
  type: ritual
  abilities:
    - text: "When you consume the mystical essence of your surroundings, roll +wits. On a strong hit, add the value of your action die to your essence track (max 6)."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Keen
  type: ritual
  abilities:
    - text: "When you hold a weapon and sing a keen for those it has killed, roll +heart. On a strong hit, the wielder inflicts +1 harm when they Strike or Clash (one fight)."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Leech
  type: ritual
  abilities:
    - text: "When you mark your hands or weapon with an intricate blood rune, roll +iron. On a strong hit, the rune thirsts for fresh blood. One time only, when you Strike or Clash and score a hit, take +2 health."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Lightbearer
  type: ritual
  abilities:
    - text: "When you focus on a source of light and capture its essence, roll +wits. On a strong hit, set your light track to +6. On a weak hit, set it to +3."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Scry
  type: ritual
  abilities:
    - text: "When you look into flames to study a remote person or location, roll +shadow. You or someone with you must have knowledge of the target. On a strong hit, you may study it at will for the rest of the scene."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Shadow-Walk
  type: ritual
  abilities:
