  health: 3
  requires: "Your cat takes down its prey"
  abilities:
    - name: Eager
      text: "When your cat chases down big game, you may Resupply with +edge (instead of +wits). If you do, take +1 supply or +1 momentum on a strong hit."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

- name: Giant Spider
  type: companion
  health: 2
  requires: "Your spider uncovers secrets"
  abilities:
    - name: Discreet
      text: "When you Secure an Advantage by sending your spider to scout a place, add +1 and take +1 momentum on a hit."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

- name: Hawk
  type: companion
  health: 3
  requires: "Your hawk can aid you while it is aloft"
  abilities:
    - name: Far-seeing
      text: "When you Undertake a Journey, or when you Resupply by hunting for small game, add +1."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

- name: Horse
  type: companion
  health: 5
  requires: "You and your horse ride as one"
  abilities:
    - name: Swift
      text: "When you Face Danger +edge using your horse's speed and grace, or when you Undertake a Journey, add +1."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

- name: Hound
  type: companion
  health: 4
  requires: "Your hound is your steadfast companion"
  abilities:
    - name: Sharp
      text: "When you Gather Information using your hound's keen senses to track your quarry or investigate a scene, add +1 and take +1 momentum on a hit. When you Secure an Advantage by sending your hound to scout a path, add +1 and take +1 momentum on a hit."
      default: true
    - name: Loyal
      text: "When you make a move aided by your hound's loyalty and companionship, add +1."
      default: false
    - name: Tenacious
      text: "When your hound pursues a quarry, you may Secure an Advantage +wits. On a hit, your hound has the quarry cornered or at bay; take +2 momentum."
      default: false

- name: Kindred
  type: companion
  requires: "Your friend stands by you"
  abilities:
    - name: Skilled
      text: "When you make a move outside of combat aided by your companion's expertise, add +1."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

- name: Mammoth
  type: companion
  health: 5
  requires: "Your mammoth walks a resolute path"
  abilities:
    - name: Lumbering
      text: "When your mammoth travels with you as you Undertake a Journey, you may add +2 but suffer -1 momentum (decide before rolling)."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

- name: Owl
  type: companion
  health: 3
  requires: "Your owl soars through the darkness"
  abilities:
    - name: Nocturnal
      text: "If you Resupply at night by sending your owl to hunt, take +2 momentum on a hit. When you Enter the Fray +wits against an ambush in darkness, add +1."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

- name: Raven
  type: companion
  health: 2
  requires: "Your raven heeds your call"
  abilities:
    - name: Sly
      text: "When you Secure an Advantage or Face Danger +shadow using your raven to perform trickery (such as creating a distraction or stealing a small object), add +1 and take +1 momentum on a hit."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

- name: Young Wyvern
  type: companion
  health: 3
  requires: "Your wyvern won't devour you. For now"
  abilities:
    - name: Insatiable
      text: "When you Undertake a Journey and score a hit, you may suffer -1 supply in exchange for +2 momentum."
      default: true
    - name: ""
      text: ""
      default: false
    - name: ""
      text: ""
      default: false

# ─── Path Assets ─────────────────────────────────────────────────────────────

- name: Alchemist
  type: path
  abilities:
    - text: "When you create an elixir, choose an effect: Deftness (edge), audacity (heart), vigor (iron), slyness (shadow), or clarity (wits). Then roll +wits. On a strong hit, create two doses. On a weak hit, create one. When you drink an elixir, add +1 and use that stat in place of any other for one move."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Animal Kin
  type: path
  abilities:
    - text: "When you make a move to pacify, calm, control, aid, or fend off an animal (or an animal or beast companion), add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Banner-Sworn
  type: path
  requires: "Once you mark a bond with a leader or faction"
  abilities:
    - text: "When you Swear an Iron Vow to serve your leader or faction on a mission, you may reroll any dice. When you Fulfill Your Vow and return to your leader, take +2 experience."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Battle-Scarred
  type: path
  requires: "Once you become maimed"
  abilities:
    - text: "You focus your energies: Reduce your edge or iron by 1 and add +2 to wits or heart, or +1 to each (to a maximum of +4)."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Blade-Bound
  type: path
  requires: "Once you mark a bond with a kin-blade, a sentient weapon imbued with the spirit of your ancestor"
  abilities:
    - text: "When you Enter the Fray or Draw the Circle while wielding your kin-blade, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Bonded
  type: path
  abilities:
    - text: "When you make a move which gives you an add for sharing a bond, add +1 more."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Commander
  type: path
  abilities:
    - text: "You lead a warband with +4 strength. Roll +strength when you command your warband to Face Danger, Secure an Advantage, Compel, or Battle."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Dancer
  type: path
  abilities:
    - text: "When you Secure an Advantage +edge by dancing for an audience, add +1 and take +2 momentum on a hit. On a strong hit, also add +2 (one time only) when you make your next move."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Devotant
  type: path
  abilities:
    - text: "When you say your daily prayers, you may Secure an Advantage by asking your god to grant a blessing. If you do, roll +your god's stat. On a strong hit, take +2 momentum. On a weak hit, take +1 momentum."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Empowered
  type: path
  abilities:
    - text: "When you Sojourn and score a weak hit or miss, you may claim the rights of hospitality warranted by your title or lineage. If you do, roll +heart. On a strong hit, take +2 momentum. On a weak hit, take +1 momentum."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Fated
  type: path
  abilities:
    - text: "When you Face Death or Face Desolation while your epic background vow is unfulfilled, it is not yet your time. Instead of rolling, you may choose to survive and press on."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Fortune Hunter
  type: path
  abilities:
    - text: "When you Swear an Iron Vow to someone under the promise of payment, add +1 and give the quest a special mark. When you successfully Fulfill the Vow, take the payment and +1 experience."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Herbalist
  type: path
  abilities:
    - text: "When you attempt to Heal using herbal remedies, and you have at least +1 supply, choose one (decide before rolling). * Add +2. * On a hit, take +1 supply."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Honorbound
  type: path
  abilities:
    - text: "When you Turn the Tide, envision how your vows give you strength in this moment. Then, when you make your move, add +2 (instead of +1) and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Improviser
  type: path
  abilities:
    - text: "When you Check Your Gear, you may roll +wits (instead of +supply). If you do, envision how you make do with a clever solution, and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Infiltrator
  type: path
  abilities:
    - text: "When you make a move to breach, traverse, or hide within an area held by an enemy, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Lorekeeper
  type: path
  abilities:
    - text: "You are the bearer of a mystical archive. When you Secure an Advantage or Gather Information using lore recalled from your studies, add +1."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Loyalist
  type: path
  abilities:
    - text: "When you Aid Your Ally, add +1 and take +1 momentum on a hit. This is in addition to the benefits taken by your ally."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Masked
  type: path
  requires: "Once you mark a bond with elves, and are gifted a mask of precious elderwood"
  abilities:
    - text: "Choose your mask's material and add +1 to two linked stats (max +4 each). * Thunderwood: Edge / Health * Bloodwood: Iron / Health * Ghostwood: Shadow / Spirit * Whisperwood: Wits / Spirit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Oathbreaker
  type: path
  requires: "Once you Forsake Your Vow"
  abilities:
    - text: "This asset counts as a debility. One time only, when you Swear an Iron Vow to redeem yourself (extreme or greater), give that vow a special mark. When you Fulfill the Vow, clear this asset and take +3 experience."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Outcast
  type: path
  abilities:
    - text: "When your supply is reduced to 0, suffer any remaining -supply as -momentum. Then, roll +wits. On a strong hit, you manage to scrape by and take +1 supply."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Pretender
  type: path
  abilities:
    - text: "When you establish a false identity, roll +shadow. On a strong hit, you may add +2 when you make moves using this identity to deceive or hide."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Revenant
  type: path
  requires: "Once you Face Death and return to the world of the living"
  abilities:
    - text: "When you are at 0 health, and Endure Harm or Face Death, add +1. If you then burn momentum to improve your result, envision what bond or vow keeps you in the world."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Rider
  type: path
  requires: "If you are with your horse companion"
  abilities:
    - text: "When you Heal your horse, or when you Face Danger to calm or encourage it, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Ritualist
  type: path
  requires: "Once you Fulfill Your Vow (formidable or greater) in service to an elder mystic, and Forge a Bond to train with them"
  abilities:
    - text: "When you Secure an Advantage to ready yourself for a ritual, envision how you prepare. Then, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Shadow-Kin
  type: path
  requires: "Once you become corrupted"
  abilities:
    - text: "You harden your heart: Reduce your heart stat by 1 and add up to +2 to shadow (to a maximum of +4)."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Sighted
  type: path
  abilities:
    - text: "When you Face Danger or Gather Information to identify or detect mystic forces, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Slayer
  type: path
  abilities:
    - text: "When you Gather Information by tracking a beast or horror, or when you Secure an Advantage by readying yourself for a fight against them, add +1 and take +2 momentum on a hit."
      default: true
    - text: "When you Strike or Clash against a beast or horror, add +1. Take +1 momentum on a weak hit."
      default: false
    - text: "When you kill a notable beast or horror, you may call upon your experience. If you do, add +1 when you make moves against a beast or horror in your next fight."
      default: false

- name: Spirit-Bound
  type: path
  abilities:
    - text: "You are haunted by someone whose death you caused through your actions or failures. When you consult with their spirit to Secure an Advantage or Gather Information, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Storyweaver
  type: path
  abilities:
    - text: "When you Secure an Advantage, Compel, or Forge a Bond by sharing an inspiring or enlightening song, poem, or tale, envision the story you tell. Then, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Trickster
  type: path
  abilities:
    - text: "When you Face Danger, Secure an Advantage, or Compel by lying, bluffing, stealing, or cheating, add +1."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Veteran
  type: path
  abilities:
    - text: "When you burn momentum to improve your result in combat, envision how your hard-won fighting experience gives you the upper hand. Then, take +1 momentum after the burn."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Waterborn
  type: path
  abilities:
    - text: "When you Face Danger, Gather Information, or Secure an Advantage related to your knowledge of watercraft, water travel, or aquatic environments, add +1."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Wayfinder
  type: path
  abilities:
    - text: "When you Undertake a Journey, take +1 momentum on a strong hit. If you burn momentum to improve your result, also take +1 momentum after the burn."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Weaponmaster
  type: path
  requires: "Once you Fulfill Your Vow (formidable or greater) in service to a seasoned warrior, and Forge a Bond to train with them"
  abilities:
    - text: "When you Secure an Advantage by sizing up your foe in a fight, or in a charged situation which may lead to a fight, add +1 and take +1 momentum on a hit."
