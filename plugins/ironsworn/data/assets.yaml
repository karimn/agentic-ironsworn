# Ironsworn Assets
# Source: Ironsworn by Shawn Tomkin (CC BY 4.0)
# All assets have three abilities. Only the first (default: true) is active at character creation.
# Companions include a health field for the starting health track value.

# ─── Combat Talents ──────────────────────────────────────────────────────────

- name: Archer
  type: combat_talent
  requires: "If you wield a bow"
  abilities:
    - text: "When you Secure an Advantage by taking a moment to aim, choose your approach and add +1. * Trust your instincts: Roll +wits, and take +2 momentum on a hit. * Aim carefully: Roll +edge, and take +2 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Berserker
  type: combat_talent
  requires: "If you are clad only in animal pelts"
  abilities:
    - text: "When you Secure an Advantage or Compel by embodying your wild nature, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Brawler
  type: combat_talent
  requires: "If you are unarmed or fighting with a non-deadly weapon"
  abilities:
    - text: "When you Secure an Advantage +iron by engaging in close-quarters brawling (such as punching, tripping, or grappling), add +1. If you score a hit, you may push your luck."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Cutthroat
  type: combat_talent
  requires: "If you wield a dagger or knife"
  abilities:
    - text: "When you are in position to Strike at an unsuspecting foe, choose one (before rolling). * Add +2 and take +1 momentum on a hit. * Inflict +1 harm on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Duelist
  type: combat_talent
  requires: "If you wield a bladed weapon in each hand"
  abilities:
    - text: "When you Strike or Clash, you may add +2. If you do (decide before rolling), inflict +1 harm on a strong hit and count a weak hit as a miss."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Fletcher
  type: combat_talent
  abilities:
    - text: "When you Secure an Advantage by crafting arrows of fine quality, add +1. Then, take +1 supply or +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Ironclad
  type: combat_talent
  requires: "If you wear armor"
  abilities:
    - text: "When you equip or adjust your armor, choose one. * Lightly armored: When you Endure Harm in a fight, add +1 and take +1 momentum on a hit. * Gird yourself: Take +1 momentum."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Long-Arm
  type: combat_talent
  requires: "If you wield a staff"
  abilities:
    - text: "In your hands, a humble staff is a deadly weapon (2 harm). When you instead use it as a simple weapon (1 harm), you may Strike or Clash +wits (instead of iron) as you find your foe's opening."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Shield-Bearer
  type: combat_talent
  requires: "If you wield a shield"
  abilities:
    - text: "When you Face Danger using your shield as cover, add +1. When you Clash in close quarters, take +1 momentum on a strong hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Skirmisher
  type: combat_talent
  requires: "If you wield a spear"
  abilities:
    - text: "When you Face Danger by holding a foe at bay using your spear's reach, roll +iron or +edge. If you score a hit, you may Strike with your spear."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Slinger
  type: combat_talent
  requires: "If you wield a sling"
  abilities:
    - text: "When launched from a sling, a simple stone inflicts deadly harm (2 harm). When you Enter the Fray by barraging your foe with sling-bullets, roll +edge."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Sunderer
  type: combat_talent
  requires: "If you wield an axe"
  abilities:
    - text: "When you Strike or Clash in close quarters, you may suffer -1 momentum and inflict +1 harm on a hit (decide before rolling)."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

- name: Swordmaster
  type: combat_talent
  requires: "If you wield a sword"
  abilities:
    - text: "When you Strike or Clash and burn momentum to improve your result, inflict +2 harm. If the fight continues, add +1 on your next move."
      default: true
    - text: "When you Swear an Iron Vow to someone who has bested you in combat, add +1. If you then Fulfill the Vow, take +2 spirit and +1 experience."
      default: false
    - text: "When you study a foe's tactics before or during a fight, you may Secure an Advantage +shadow (instead of wits). On a hit, also take +1 momentum."
      default: false

- name: Thunder-Bringer
  type: combat_talent
  requires: "If you wield a mighty hammer"
  abilities:
    - text: "When you Face Danger, Secure an Advantage, or Compel by hitting or breaking an inanimate object, add +1 and take +1 momentum on a hit."
      default: true
    - text: ""
      default: false
    - text: ""
      default: false

# ─── Companion Assets ────────────────────────────────────────────────────────

- name: Cave Lion
