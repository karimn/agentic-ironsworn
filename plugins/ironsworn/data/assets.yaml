    - text: ""
      default: false
    - text: ""
      default: false

- name: Wildblood
  type: path
  abilities:
    - text: "When you Face Danger, Secure an Advantage, or Gather Information using your knowledge of tracking, woodcraft, or woodland creatures, add +1."
